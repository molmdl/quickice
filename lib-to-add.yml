genice2-cif:     # direct  — CIF file plugin for GenIce2
  version: "2.2.1"
  type: direct
  source: "pip install genice2-cif by research agent (ses_1454ee3abffeN0XTD7700PO0Pf)"
  deps:
    cif2ice:       "0.4.1"   # dep — CIF to ICE format converter
    pycifrw:       "5.0.1"   # dep — CIF file reader/writer
    ply:           "3.11"    # dep — parser for pycifrw
    jinja2:        "3.1.6"   # dep — template engine for cif2ice
    markupsafe:    "3.0.3"   # dep — HTML escaping for jinja2
    requests:      "2.34.2"  # dep — HTTP client for genice2-cif
    certifi:       "2026.5.20" # dep — CA bundle for requests
    charset-normalizer: "3.4.7" # dep — charset detection for requests
    idna:          "3.18"    # dep — internationalized domain names for requests
    urllib3:       "2.7.0"   # dep — HTTP connection pooling for requests
    toml:          "0.10.2"  # dep — TOML parser for cif2ice
    validators:    "0.35.0"  # dep — data validation for genice2-cif
    wcwidth:       "0.8.1"   # dep — width calculation for prettytable
    prettytable:   "3.17.0"  # dep — ASCII tables for genice2-cif

