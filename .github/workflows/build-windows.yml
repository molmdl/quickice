name: Build Windows Executable

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment-build.yml
          activate-environment: quickice-build
      
      - name: Build executable
        shell: bash -el {0}
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pyinstaller --clean quickice-gui.spec
      
      - name: Copy documentation and licenses
        shell: bash
        run: |
          mkdir -p dist/package
          cp -r dist/quickice-gui dist/package/
          cp README.md README_bin.md dist/package/
          cp LICENSE dist/package/
          mkdir -p dist/package/docs
          cp -r docs/gui-guide.md docs/principles.md docs/ranking.md docs/images dist/package/docs/
          cp -r licenses dist/package/
      
      - name: Create distribution
        shell: bash
        run: |
          cd dist
          7z a -tzip quickice-v2.1.1-windows-x86_64.zip package/
          mv quickice-v2.1.1-windows-x86_64.zip ../
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-executable
          path: quickice-v2.1.1-windows-x86_64.zip
