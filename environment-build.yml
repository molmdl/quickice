name: quickice-build
channels:
  - conda-forge
  - defaults
dependencies:
  # Python runtime
  - python=3.14.3
  
  # Qt framework (cross-platform)
  - pyside6=6.10.2
  
  # VTK for 3D visualization (cross-platform)
  - vtk=9.5.2
  
  # Scientific computing (cross-platform)
  - numpy=2.4.3
  
  # Build tools
  - pip
  - pip:
      # PyInstaller for building executables
      - pyinstaller==6.19.0
      
      # Application dependencies (from environment.yml pinned versions)
      - click==8.3.1
      - cycless==0.7
      - deprecated==1.3.1
      - deprecation==2.1.0
      - genice-core==1.4.3
      - genice2==2.2.13.1
      - graphstat==0.3.3
      - iapws==1.5.5
      - matplotlib==3.10.8
      - methodtools==0.4.7
      - networkx==3.6.1
      - openpyscad==0.5.0
      - pairlist==0.6.4
      - scipy==1.17.1
      - shapely==2.1.2
      - six==1.17.0
      - spglib==2.7.0
      - wirerope==1.0.0
      - wrapt==2.1.2
      - yaplotlib==0.1.3
